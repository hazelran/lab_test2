- title: "Depth-wise Split Unit Coding Order for Video Compression"
  authors: "VCP-Lab, Prof. Aiahn Kiho Choi"
  journal: "IEEE Transactions on Circuits and Systems for Video Technology"
  year: 2022
  highlight: 1
  theme: standards
  image: pub_placeholder.png
  description: >
    This paper proposes a novel depth-wise split unit coding order for video compression,
    enabling more efficient block partitioning decisions in VVC and related standards.
    The method reduces encoder complexity while maintaining coding efficiency.
