- title: "GHMSA-Net: Gated Hierarchical Multi-Scale Self-Attention for Perceptually-Guided AV1 Post-Processing"
  authors: "VCP-Lab"
  journal: "IEEE Access"
  year: 2025
  highlight: 1
  theme: ai
  description: >
    GHMSA-Net introduces a gated hierarchical multi-scale self-attention mechanism for
    post-processing AV1 compressed video. The network uses perceptual guidance to enhance
    visual quality, achieving significant PSNR and SSIM improvements over the baseline codec.
