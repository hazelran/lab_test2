  description: 최근 세계적으로 동영상의 활용도가 크게 증가하고 있다. 새로운 서비스를 제공하기 위한 동영상 기반 애플리케이션 등장과 함께 동영상 응용 분야가 빠르게 진화하고 있으며, 이러한 응용 분야의 특징은 고해상도 및 고품질 영상을 활용하여 소비자의 경험을 더욱 풍부하게 만든다는 것이다. 동영상 활용도의 증가는 인터넷 트래픽에서 동영상이 차지하는 비중을 더욱 가중화 하는 결과를 만들고 있고, 증가된 영상 트래픽을 제어하기 위하여 동영상 압축 기술의 중요성이 부각되고 있다. 본 논문은 영상 데이터를 효율적으로 압축하기 위해서 등장한 최신 코덱 표준 중 하나인 MPEG-5 part1 Essential Video Coding (EVC) 표준의 오픈소스 코덱인 XEVE, XEVD의 압축 성능과 복잡도를 평가하고 실험 결과를 통해 새로운 통찰력을 제시하고자 한다. 구체적으로 실험을 통해 확인된 XEVE, XEVD 압축 성능은 제공하는 모드에 따라서 다양하게 나타나지만 표준화 과정에서 제시된 성능과 유사하여 시제품을 위한 성능 검증을 위한 활용도는 높은 것으로 판단된다. XEVE, XEVD의 복잡도 성능은 상용화 관점에서 바로 제품에 적용하기에는 인코더 복잡도 부분에서 개선이 필요할 것으로 확인되었다.
