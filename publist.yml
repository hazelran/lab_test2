- title: Unified Framework of Frame Skipping and Interpolation for Efficient Video Compression
  authors: Sunyoung Lee, Myungjung Lee, Kiho Choi, and Euee S. Jang
  journal: IEEE International Conference on Network Infrastructure and Digital Content (IC-NIDC)
  year: 2009
  category: International Conference
  id: IC01
  url: https://doi.org/10.1109/icnidc.2009.5360919
  description: In this paper, we propose the unified framework of frame skipping and interpolation (UF-FSI) for efficient video compression. Frame skipping and interpolation is one of the efficient approaches to reduce the redundancy of video frames. A joint design of frame skipping and interpolation is made for maximization of compression efficiency, which was not considered from previous research. A good advantage of UF-FSI is that it can be applied to any conventional video codec. Frame skipping in the proposed method is done by selecting key frames through analysis of neighboring frames. In frame interpolation, in-between frames are reconstructed by key frames using motion compensated interpolation. Using with MPEG-4 simple profile, UF-FSI offered additional coding efficiency up to 25 percent with good visual quality.
