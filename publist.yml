- title: Analysis of Next-Generation VVC/H.266 Standard for Gaming Content
  authors: Xilong Liang, Kiho Choi
  journal: Journal of Broadcast Engineering
  volume: '29'
  pages: 1157-1167
  year: 2024
  category: Domestic Journal
  id: DJ07
  url: https://doi.org/10.5909/jbe.2024.29.7.1157
  description: Game streaming has emerged as a key technology that enables high-end gaming on various devices by offloading complex processing tasks to remote, high-performance servers. However, delivering high-quality game streams with minimal latency and high compression efficiency presents several challenges in video compression. This paper evaluates the impact of key coding tools in the Versatile Video Coding (VVC)/H.266 standard on gaming content. Experimental results show that tools such as Intra Block Copy (IBC) and Linear Model for Chrominance intra prediction (LMChroma) provide excellent compression performance for screen content sequences, while Chroma Transform Skip (ChromaTS) and Joint Cb and Cr (JCCR) exhibit limited performance due to differences in chroma structure. These findings highlight the need for next-generation coding standards to more effectively reflect the unique characteristics of gaming content, ensuring high-quality, low-latency streaming.
