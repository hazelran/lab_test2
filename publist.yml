  authors: Kiho Choi, Ki hoon Lee, Eun Ji Kim and Euee S. Jang
  journal: IEEE International Conference on Network Infrastructure and Digital Content (IC-NIDC)
  year: 2010
  category: International Conference
  id: IC02
  url: https://doi.org/10.1109/icnidc.2010.5657972
  description: In this paper, we propose a zero quantized DCT coefficients-aware algorithm for the implementation of fast inverse quantization (IQ) and inverse discrete cosine transform (IDCT). In our prior work [4], we showed that zero coefficient-ware IDCT algorithm for fast decoding. In this paper, we extended a zero-skipping IDCT (Z-IDCT) by incorporating IQ with Z-IDCT. By adaptively skipping zero quantized coefficient computations, the proposed method can significantly reduce the computation time of IQ and IDCT in decoder. The decoding time of IQ and IDCT using the proposed method showed 36.7 percent speedup on average compared to that of MPEG-4 simple profile, and it also showed 9.6 percent speedup on average compared to that of Z-IDCT with MPEG-4 simple profile.
