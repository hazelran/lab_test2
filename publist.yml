- title: Adaptive search range adjustment scheme for fast motion estimation in AVC/H.264
  authors: Sunyoung Lee, Kiho Choi and Euee S. Jang
  journal: Optical Engineering
  volume: '50'
  pages: '067402'
  year: 2011
  category: International Journal
  id: IJ03
  url: https://doi.org/10.1117/1.3589292
  description: AVC/H.264 supports the use of multiple reference frames (e.g., 5 frames in AVC/H.264) for motion estimation (ME), which demands a huge computational complexity in ME. We propose an adaptive search range adjustment scheme to reduce the computational complexity of ME by reducing the search range of each reference frame-from the (t-1)'th frame to the (t-5)'th frame-for each macroblock. Based on the statistical analysis that the 16×16 mode type is dominantly selected rather than the other block partition mode types, the proposed method reduces the search range of the remaining ME process in the given reference frame according to the motion vector (MV) position of the 16×16 block ME. In the case of the (t-1)'th frame, the MV position of the 8×8 block ME-in addition to that of 16×16 block ME-is also used for the search range reduction to sub-block partition mode types of the 8×8 block. The experimental results show that the proposed method reduces about 50% and 65% of the total encoding time over CIF/SIF and full HD test sequences, respectively, without any noticeable visual degradation, compared to the full search method of the AVC/H.264 encoder.
