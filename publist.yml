- title: Overview of Baseline Profile in MPEG-5 Essential Video Coding Standard
  authors: Kwang Pyo Choi, Kiho Choi*, Min Woo Park, Minsoo Park, Yinji Piao, Minseok Choi, Heechul Yang, Youngo Park
