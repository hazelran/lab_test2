- title: The Joint Exploration Model (JEM) for Video Compression with Capability beyond HEVC
  authors: Jianle Chen, Marta Karczewicz, Yu-Wen Huang, Kiho Choi, Jens-Rainer Ohm, Gary J. Sullivan
