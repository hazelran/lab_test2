  description: 'Whole Slide Imaging (WSI), which enables the scanning and archiving of entire tissue slides at ultra-high resolution, has completely changed digital pathology by allowing pathologists to visually walk through the entire tissue sample and investigate regions of interest (ROI). Due to the technological advancements in digital scanners, picture visualization methods, and the integration of artificial intelligence-derived algorithms into these systems, its more recent applications offer promising futures. The huge storage requirements of these large-scale images, however, pose significant challenges for storage, transmission, and retrieval. This paper offers a thorough analysis of the related and recent WSI compression methods created for scanners. The main objective of this analysis is to offer a thorough overview of the current approaches and potential future paths in this quickly developing topic. This work has highlighted the key requirements for effective WSI compression, considering the need to compromise between high compression ratios and little loss of visual and diagnostic quality. Additionally, this study seeks to offer useful insights into the developments achieved in WSI compression algorithms for scanners, illuminating the present difficulties and potential future developments in this important area of digital pathology.

'
