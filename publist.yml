  pages: 178-184
  year: 2013
  category: Domestic Journal
  id: DJ01
  url: https://doi.org/10.5909/jbe.2013.18.2.178
  description: This paper addresses the current technical challenge of an impedance mismatch between the requirements of smart connected object applications within the sensing environment and the characteristics of today's cloud infrastructure. We investigate the possibility to offload cloud tasks, such as storage and data signal processing to the edge of the network, thus decreasing the latency associated with performing those tasks within the cloud. The research scenario is an e-Health laboratory implementation where the real-time processing is performed by the home PC, while the extracted metadata is sent to the cloud for further processing.
