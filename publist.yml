- title: An Efficient AVC/H. 264 Intra Mode Scheme for Visual Quality Improvement
  authors: Kiho Choi, Ki hoon Lee, Gyeong Gi Noh and Euee S. Jang
  journal: International Conference on Multimedia Information Technology and Applications (MITA)
  year: 2011
  category: International Conference
  id: IC03
  url: https://doi.org/10.1007/s11042-013-1480-2
  description: In this paper, we propose an efficient intra mode scheme for visual quality improvement in AVC/H.264. In AVC/H.264 intra prediction, spatial neighboring blocks are used to predict the current block pixels. While the pixels in the left and top positions of the current block can be predicted accurately, the prediction of the pixels in the right and bottom positions is not as effective due to low correlation between the reconstructed and current pixels. This affects visual quality of reconstructed video quality substantially. Here, we propose an efficient intra mode scheme, which adaptively adjusts the predictive value for intra prediction by using the differential values of the neighbor blocks. The experimental results show that the proposed method implemented in the AVC/H.264 reference software produced the better visual quality than that of conventional intra prediction without any loss in compression efficiency.
