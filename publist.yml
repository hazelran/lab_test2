  year: 2021
  category: International Conference
  id: IC16
  url: https://doi.org/10.1117/12.2597682
  description: The MPEG-5 Essential Video Coding (EVC) Standard was finalized in July 2020 in ISO/IEC Moving Picture Experts Group (MPEG). The main goal of the EVC standard development was to provide a significantly improved compression efficiency over existing video coding standards with timely publication of licensing terms. To achieve the goal of project, the EVC standard was developed with the royalty-free based Baseline profile (BP) as its base and a royalty bearing Main profile having a small number of coding tools on top of the Baseline profile. This paper presents EVC BP which can be a strong candidate for the media application that is a dominant in the internet platform. To evaluate the coding performance of the EVC BP, the testing result compared to H.264/AVC is provided. In the testing result, the EVC BP has shown 31.2% and 30.4% bitrate reductions with using only 40% and 23% encoding times of H.264/AVC under RA and LD test scenarios, respectively.
