      author={Yinji Piao, Kiho Choi, M. W. Park, Minsoo Park, Kwang Pyo Choi},
      title={Split Unit Coding Order for Video Coding},
      journal={IEEE International Conference on Multimedia (ICME)},
      year={2021},
      doi={10.1109/icme51207.2021.9428179}
    }
- title: Merge Mode With Motion Vector Difference
  authors: Seungsoo Jeong, Yinji Piao, Min Woo Park, Minsoo Park, Anish Tamse, Narae Choi, Kiho Choi, Woongil Choi, Chanyul Kim
  journal: IEEE International Conference on Image Processing (ICIP)
  year: 2020
  category: International Conference
  id: IC14
  url: https://doi.org/10.1109/icip40778.2020.9190637
  description: This paper proposes a new motion vector expression method named merge mode with motion vector difference (MMVD) for future video coding standards. In the previous standards, two approaches are typically used for motion vector representation. In the first one, the motion vector is derived from neighboring blocks and is directly used for motion compensation (merge mode in HEVC), and in the other one, the motion vector is represented with motion vector predictor and a difference (adaptive motion vector prediction; AMVP in HEVC). The merge mode benefits by saving bits for representing motion information. The AMVP represents more accurate motion information but it needs to signal the motion difference information, which consumes additional bits. MMVD provides a compromised solution for the tradeoff between motion vector accuracy and its overhead. MMVD can improve motion vector accuracy by introducing a simplified motion vector representation. The results show that the proposed method improves coding efficiency ofV VC with an average of 0.51% in BD-rate saving.
