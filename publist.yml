  url: https://doi.org/10.1109/icmew46912.2020.9105993
  description: This paper describes transform coefficient coding using the scan region-based method adopted in the Draft Standard of the AVS3-phase2 specification. Transform coefficient coding in the scan region-based method encompasses the definition of the scan region, the coding scheme in the given scan region and the context model selection for the coefficients’ multi-layer level coding. Experimental results show that the proposed method improves coding efficiency on average by 2.84%, 1.73%, 1.42% BD-rate over AVS3-Baseline coefficient coding scheme in AI, RA and LD configurations, respectively.
